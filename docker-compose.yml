version: '3.8'

services:
  # ┌─────────────────────────────────────────┐
  # │  SERVICE DATABASE (MySQL)               │
  # └─────────────────────────────────────────┘
  db:
    image: mysql:8.0
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: sport_db
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ┌─────────────────────────────────────────┐
  # │  SERVICE BACKEND (Node.js/GraphQL)      │
  # └─────────────────────────────────────────┘
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=sport_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy  # Tunggu sampai DB benar-benar siap

  # ┌─────────────────────────────────────────┐
  # │  SERVICE CLIENT (Frontend Nginx)        │
  # └─────────────────────────────────────────┘
  client:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./client:/usr/share/nginx/html

# Mendeklarasikan volume untuk menyimpan data MySQL secara permanen
volumes:
  mysql_data: