services:
  # ┌─────────────────────────────────────────┐
  # │  SERVICE DATABASE (MySQL)               │
  # └─────────────────────────────────────────┘
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: sport_db
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ┌─────────────────────────────────────────┐
  # │  SERVICE BACKEND (Node.js/GraphQL)      │
  # └─────────────────────────────────────────┘
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=sport_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ┌─────────────────────────────────────────┐
  # │  SERVICE CLIENT (Frontend Nginx)        │
  # └─────────────────────────────────────────┘
  client:
    build: ./client
    ports:
      - "8081:80"
    depends_on:
      - backend

# Mendeklarasikan volume untuk menyimpan data MySQL secara permanen
volumes:
  mysql_data: